<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backward Counting</title>
</head>
<body>
    
<script>


let start = prompt("Enter a Number to show backward counting")
let end = prompt(" Enter lenght");

if (start >= end) {
    document.writeln("<h3>Backward Counting:</h3>");
    
    for (let i = start; i >= end; i--) {
        document.writeln(i + "<br>");
    }
} else {
    document.writeln("Sorry ! for backward counting first number must be greater .");
}
// c)


</script>


</body>
</html>
